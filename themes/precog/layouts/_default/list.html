{{ define "main" }}
<section class="container mx-auto px-6 py-20">
  <h1 class="text-5xl font-bold text-center mb-12">Articles</h1>
  <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
    {{ range .Pages }}
      <article class="holographic p-6 rounded-xl scanline">
        <h2 class="text-2xl font-bold mb-2 glitch" data-text="{{ .Title }}">{{ .Title }}</h2>
        <p class="text-sm text-cyan-400 mb-4">{{ .Date.Format "02 Jan 2006" }}</p>
        <a class="holographic-btn inline-block px-4 py-2 mt-4" href="{{ .RelPermalink }}">Lire la suite</a>
      </article>
    {{ end }}
  </div>
</section>
{{ end }}
