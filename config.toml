baseURL = 'https://blog.gcourtot.fr/'
languageCode = 'fr-FR'
title = 'Bonjour la toile'
theme = "papermod"
paginate = 5

[taxonomies]
  tag = "tags"

[params]
  ShowToc = true
  ShowReadingTime = true
  author = "Guillaume"
  mainSections = ["posts"]

[params.homeInfoParams]
  Title = "Salut"
  Content = "Salut, je suis Guillaume. Je code, je brase, je pick des locks et je fais de l'apnée — pas forcément dans cet ordre. Ce blog c'est là où tout ça atterrit."

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[menu]
  [[menu.main]]
    name = "Accueil"
    url = "/"
    weight = 1

  [[menu.main]]
    name = "Le Blog"
    url = "/posts/"
    weight = 10

  [[menu.main]]
    name = "À propos"
    url = "/about/"
    weight = 20

  [[menu.main]]
    name = "Projets"
    url = "/tags/projet/"
    weight = 15
